name: Build and Push Images to Docker Hub

on:
  push:
    branches: ["main"] # Triggers whenever you push code to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      # Matrix allows building all 6 of your custom services simultaneously
      matrix:
        include:
          - service_name: auth-service
            context: ./backend/auth-service
          - service_name: incident-service
            context: ./backend/incident-service
          - service_name: department-service
            context: ./backend/department-service
          - service_name: notification-service
            context: ./backend/notification-service
          - service_name: media-service
            context: ./backend/media-service
          - service_name: frontend
            context: ./frontend

    steps:
      # 1. Pull the codebase into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure Docker build tools
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Securely log into your Docker Hub account
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build the image and push it straight to your Docker Hub repository
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          # This tags it as yourusername/service-name:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service_name }}:latest
